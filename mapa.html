<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>GeoPets | Mapa Interactivo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />

  <!-- Estilos Premium -->
  <link rel="stylesheet" href="style.css">

  <link rel="icon" type="image/png" href="imagenes/icono.jpg">

  <style>
    /* Estilos específicos para hacer el mapa de pantalla completa */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden; /* Evitar scroll */
    }

    /* Ajuste de contenedor de mapa a pantalla completa */
    #map {
      width: 100vw;
      height: 100vh;
      z-index: 1; 
    }

    /* Botón Flotante para regresar al inicio */
    .btn-back-home {
      position: absolute;
      top: 20px;
      left: 60px; /* Separado de los controles de zoom del mapa */
      z-index: 1000;
      background: var(--bg-card);
      color: var(--primary);
      border: 1px solid rgba(16, 185, 129, 0.3);
      padding: 10px 20px;
      border-radius: var(--radius-full);
      font-weight: 600;
      box-shadow: var(--shadow-md);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-back-home:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

  </style>
</head>

<body>

  <!-- Botón para volver a la página principal -->
  <a href="index.html" class="btn-back-home">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    Volver a Inicio
  </a>

  <!-- CONTENEDOR DEL MAPA -->
  <div id="map"></div>

  <!-- CÓDIGO LEAFLET Y SCRIPTS TRADICIONALES DE GEOSERVER (Manteniendo tu conexión original) -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

  <!-- MODAL PARA PERROS INDIVIDUALES DEL MAPA -->
  <style>
    #modalPerdido {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(5px);
      justify-content: center;
      align-items: center;
      z-index: 10000;
      padding: 20px;
    }

    #modalPerdido .contenido {
      background: white;
      border-radius: 16px;
      padding: 30px;
      max-width: 500px;
      width: 100%;
      position: relative;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
    }

    #modalPerdido .cerrar {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 24px;
      cursor: pointer;
      color: #64748b;
    }

    #modalPerdido img {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 15px;
    }
  </style>
  <div id="modalPerdido">
    <div class="contenido">
      <span class="cerrar">&times;</span>
      <div id="modalContenido"></div>
    </div>
  </div>

  <script>
    // Inicialización del Mapa a nivel de Bogotá
    const map = L.map('map').setView([4.65, -74.1], 12);

    // Capa OpenStreetMap
    var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    /* -------------------------------------------------------------
       CAPAS WMS DE GEOSERVER (Solo funcionan si GeoServer local está activo)
       ------------------------------------------------------------- */
    try {
      var localidades = L.tileLayer.wms("http://localhost:8080/geoserver/geopets/wms", {
        layers: "geopets:localidades",
        format: "image/png",
        transparent: true,
        attribution: "GeoPets"
      });

      // Controles de capa
      var baseMaps = { "OpenStreetMap": osm };
      var overlayMaps = { "Localidades": localidades };
      L.control.layers(baseMaps, overlayMaps).addTo(map);

      L.tileLayer.wms("http://localhost:8080/geoserver/geopets/wms", {
        layers: "geopets:perros_perdidos",
        format: "image/png",
        transparent: true,
        attribution: "GeoPets"
      }).addTo(map);
    } catch (err) { console.warn("No se pudo conectar a GeoServer:", err); }

    /* -------------------------------------------------------------
       MARCADORES Y DATOS ESTÁTICOS
       ------------------------------------------------------------- */
    var perroIcon = L.icon({
      iconUrl: 'imagenes/icono.jpg',
      iconSize: [35, 35], iconAnchor: [17, 35], popupAnchor: [0, -30]
    });

    var markers = L.markerClusterGroup();

    // Se cargan las mascotas leyendo datos_mascotas.json y mapeando de forma dinámica
    fetch('datos_mascotas.json?t=' + new Date().getTime())
      .then(res => res.json())
      .then(data => {
        Object.keys(data).forEach(id => {
          let animal = data[id];
          
          // Como en el JSON no tienes lat/lng guardadas para todos temporalmente, 
          // usaremos la variable estática `perros` abajo para renderizar lo visual por ahora, 
          // o puedes agregar "lat" y "lng" a tu archivo datos_mascotas.json luego.
        });
      });

    // Simulando tus datos originales hardcodeados de index para la demo visual del cluster
    var perros = [
      { nombre: "Luna", descripcion: "Perra blanca con manchas negras", telefono: "3102223344", img: "perro_perdidos/lupita.jpg", lat: 4.6233, lng: -74.1135 },
      { nombre: "Max", descripcion: "Perro perdido cerca del parque", telefono: "321123456", img: "perro_perdidos/max.jpg", lat: 4.6250, lng: -74.1100 }
    ];

    perros.forEach(function (animal) {
      var marker = L.marker([animal.lat, animal.lng], { icon: perroIcon });
      var popupContent = `
        <div style="font-family: 'Inter', sans-serif;">
          <b>${animal.nombre} <span style="color:white; background:#ef4444; padding:2px 6px; border-radius:4px; font-size:0.7em;">PERDIDO</span></b><br>
          <img src="${animal.img}" alt="${animal.nombre}" style="width:100%; border-radius:8px; margin:8px 0;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/616/616408.png'">
          <p style="margin:0; font-size:13px; color:#64748b;">📞 ${animal.telefono}</p>
          <button class="verMasBtn" data-nombre="${animal.nombre}" data-img="${animal.img}" data-desc="${animal.descripcion}" data-tel="${animal.telefono}" 
            style="margin-top:10px; width:100%; padding:8px; cursor:pointer; border:none; background:var(--primary); color:white; border-radius:6px; font-weight:600;">Contactar Dueño</button>
        </div>
      `;
      marker.bindPopup(popupContent);
      markers.addLayer(marker);
    });

    map.addLayer(markers);

    // Lógica del Modal
    var modal = document.getElementById('modalPerdido');
    var modalCont = document.getElementById('modalContenido');

    document.addEventListener('click', function (e) {
      if (e.target && e.target.classList.contains('verMasBtn')) {
        var btn = e.target;
        modalCont.innerHTML = `
          <h2 style="font-family:'Outfit', sans-serif; margin-bottom:10px;">${btn.getAttribute('data-nombre')} 
              <span style="color:white; background:#ef4444; padding:3px 8px; border-radius:6px; font-size:0.6em; vertical-align:middle;">PERDIDO</span>
          </h2>
          <img src="${btn.getAttribute('data-img')}" alt="Foto" onerror="this.src='https://cdn-icons-png.flaticon.com/512/616/616408.png'">
          <p style="font-size:15px; color:#334155;"><b>Descripción:</b> ${btn.getAttribute('data-desc')}</p>
          <p style="font-size:15px; margin-top:15px;"><b style="color:var(--primary);">📞 Contacto:</b> <a href="https://wa.me/57${btn.getAttribute('data-tel')}" target="_blank" style="color:var(--text-main); font-weight:bold;">${btn.getAttribute('data-tel')}</a></p>
        `;
        modal.style.display = 'flex';
      }
    });

    document.querySelector('.cerrar').addEventListener('click', () => modal.style.display = 'none');
    window.addEventListener('click', (e) => { if (e.target == modal) modal.style.display = 'none'; });
  </script>

</body>

</html>
